<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATIS Admin</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --text-dim:  #7d8590;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --yellow:    #d29922;
    --red:       #f85149;
    --purple:    #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

  /* ── Auth gate ── */
  #authGate {
    display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px;
  }
  #authGate h1 { font-size: 18px; color: var(--text-dim); letter-spacing: 2px; }
  #authGate input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 16px; border-radius: 6px; font-family: inherit; font-size: 14px; width: 280px;
    outline: none;
  }
  #authGate input:focus { border-color: var(--accent); }
  #authGate button {
    background: var(--accent); color: #000; border: none; padding: 10px 24px;
    border-radius: 6px; font-family: inherit; font-weight: bold; cursor: pointer; width: 280px;
  }
  #authErr { color: var(--red); font-size: 12px; }

  /* ── Main layout ── */
  #app { display: none; flex-direction: column; height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 14px; letter-spacing: 2px; color: var(--text-dim); flex: 1; }
  #liveIndicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  #liveIndicator.off { background: var(--text-dim); }
  #lastRefresh { color: var(--text-dim); font-size: 11px; }
  #logoutBtn { background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
  #logoutBtn:hover { border-color: var(--red); color: var(--red); }

  /* ── Stats bar ── */
  #stats {
    display: flex; gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    background: var(--surface); flex: 1; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label { color: var(--text-dim); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-size: 22px; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.yellow{ color: var(--yellow); }

  /* ── Filters ── */
  #filters {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  #filters select, #filters input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none;
  }
  #filters select:focus, #filters input:focus { border-color: var(--accent); }
  #filters label { color: var(--text-dim); font-size: 11px; }
  #clearFilters {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px;
  }
  #clearFilters:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Table ── */
  #tableWrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface); position: sticky; top: 0; z-index: 1;
    padding: 8px 12px; text-align: left; color: var(--text-dim);
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
  tbody tr { border-bottom: 1px solid #21262d; }
  tbody tr:hover { background: #1c2128; }
  tbody td { padding: 7px 12px; white-space: nowrap; }
  tbody tr.new-row { animation: flashIn .6s ease; }
  @keyframes flashIn { from { background: #1e3a2f; } to { background: transparent; } }

  .icao { color: var(--accent); font-weight: bold; }
  .status-complete    { color: var(--green); }
  .status-error       { color: var(--red); }
  .status-transcribing{ color: var(--yellow); }
  .status-calling     { color: var(--yellow); }
  .status-pending     { color: var(--text-dim); }
  .status-no_phone    { color: var(--text-dim); }
  .status-cached      { color: var(--purple); }

  .pill {
    display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .pill-complete    { background: #1a3c2a; color: var(--green); }
  .pill-error       { background: #3c1a1a; color: var(--red); }
  .pill-transcribing{ background: #3c2e1a; color: var(--yellow); }
  .pill-calling     { background: #3c2e1a; color: var(--yellow); }
  .pill-pending     { background: #222; color: var(--text-dim); }
  .pill-no_phone    { background: #222; color: var(--text-dim); }

  .dim { color: var(--text-dim); }
  .err { color: var(--red); max-width: 260px; overflow: hidden; text-overflow: ellipsis; }

  #noRows { text-align: center; padding: 40px; color: var(--text-dim); }

  /* ── Detail drawer ── */
  #drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform .2s ease;
    overflow-y: auto; z-index: 100;
  }
  #drawer.open { transform: translateX(0); }
  #drawerClose {
    position: sticky; top: 0; background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  #drawerClose h3 { font-size: 13px; color: var(--text-dim); }
  #drawerClose button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
  #drawerBody { padding: 16px; }
  .drawer-row { display: flex; gap: 8px; margin-bottom: 10px; border-bottom: 1px solid #21262d; padding-bottom: 10px; }
  .drawer-row:last-child { border-bottom: none; }
  .drawer-key { color: var(--text-dim); width: 130px; flex-shrink: 0; font-size: 11px; padding-top: 1px; }
  .drawer-val { color: var(--text); word-break: break-all; font-size: 12px; }
  .transcript-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px; font-size: 11px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; max-height: 300px; overflow-y: auto; color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- Auth gate -->
<div id="authGate">
  <h1>ATIS ADMIN</h1>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <button onclick="tryAuth()">Sign In</button>
  <div id="authErr"></div>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <h1>ATIS ADMIN · CALL LOG</h1>
    <div id="liveIndicator" title="Live updates"></div>
    <span id="lastRefresh" class="dim"></span>
    <button id="logoutBtn" onclick="logout()">Sign Out</button>
  </header>

  <div id="stats">
    <div class="stat">
      <div class="stat-label">Calls Today</div>
      <div class="stat-value" id="statToday">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Success Rate</div>
      <div class="stat-value green" id="statSuccess">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Errors Today</div>
      <div class="stat-value red" id="statErrors">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Avg Duration</div>
      <div class="stat-value yellow" id="statAvgDur">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Avg Recording</div>
      <div class="stat-value" id="statAvgRec">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Unique IPs Today</div>
      <div class="stat-value" id="statIPs">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Transcribed</div>
      <div class="stat-value" id="statChars">—</div>
    </div>
  </div>

  <div id="filters">
    <label>Status</label>
    <select id="fStatus" onchange="applyFilters()">
      <option value="">All</option>
      <option value="complete">Complete</option>
      <option value="error">Error</option>
      <option value="transcribing">Transcribing</option>
      <option value="calling">Calling</option>
      <option value="no_phone">No Phone</option>
    </select>
    <label>Airport</label>
    <input id="fIcao" placeholder="KXXX" maxlength="4" oninput="applyFilters()" style="width:80px;text-transform:uppercase">
    <label>IP</label>
    <input id="fIp" placeholder="1.2.3.4" oninput="applyFilters()" style="width:120px">
    <label>Date</label>
    <select id="fDate" onchange="applyFilters()">
      <option value="1">Today</option>
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="0">All time</option>
    </select>
    <button id="clearFilters" onclick="clearFilters()">Clear</button>
    <span id="rowCount" class="dim" style="margin-left:auto;font-size:11px"></span>
  </div>

  <div id="tableWrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('created_at')">Time</th>
          <th onclick="sortBy('icao')">Airport</th>
          <th onclick="sortBy('status')">Status</th>
          <th onclick="sortBy('ip_address')">IP Address</th>
          <th onclick="sortBy('duration')">Total Duration</th>
          <th onclick="sortBy('recording_duration_sec')">Recording</th>
          <th onclick="sortBy('transcription_len')">Transcript</th>
          <th>Call SID</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="noRows" style="display:none">No matching records.</div>
  </div>
</div>

<!-- Detail drawer -->
<div id="drawer">
  <div id="drawerClose">
    <h3>JOB DETAIL</h3>
    <button onclick="closeDrawer()">×</button>
  </div>
  <div id="drawerBody"></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SUPABASE_URL    = 'https://zkilbgilzoxlxbyzyqgn.supabase.co'
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpraWxiZ2lsem94bHhieXp5cWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2NDMxNTUsImV4cCI6MjA1OTIxOTE1NX0.s_a5D46TUHbQgLXiUbeGKPLBE2bNINe0AhLJl09eU_U'

// Change this password to something private before deploying
const ADMIN_PASSWORD  = 'atis-admin-2026'
const PAGE_LIMIT      = 500

// ── Auth ─────────────────────────────────────────────────────────────────────
function tryAuth() {
  const pw = document.getElementById('pwInput').value
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('atis-admin-auth', '1')
    showApp()
  } else {
    document.getElementById('authErr').textContent = 'Incorrect password.'
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryAuth() })

function logout() {
  sessionStorage.removeItem('atis-admin-auth')
  location.reload()
}

if (sessionStorage.getItem('atis-admin-auth') === '1') showApp()

function showApp() {
  document.getElementById('authGate').style.display = 'none'
  document.getElementById('app').style.display = 'flex'
  init()
}

// ── Data ─────────────────────────────────────────────────────────────────────
let allRows = []
let sortKey = 'created_at'
let sortDir = -1 // -1 = desc

async function fetchJobs() {
  const days = parseInt(document.getElementById('fDate')?.value ?? '1')
  let url = `${SUPABASE_URL}/rest/v1/atis_jobs?select=id,icao,status,ip_address,call_sid,recording_url,transcription,error_msg,created_at,completed_at,recording_duration_sec&order=created_at.desc&limit=${PAGE_LIMIT}`
  if (days > 0) {
    const since = new Date(Date.now() - days * 86400_000).toISOString()
    url += `&created_at=gte.${encodeURIComponent(since)}`
  }
  const res = await fetch(url, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  })
  if (!res.ok) return
  const rows = await res.json()
  // Augment with derived fields
  allRows = rows.map(r => ({
    ...r,
    duration: (r.completed_at && r.created_at)
      ? Math.round((new Date(r.completed_at) - new Date(r.created_at)) / 1000)
      : null,
    transcription_len: r.transcription ? r.transcription.length : 0,
  }))
  updateStats()
  renderTable()
  document.getElementById('lastRefresh').textContent =
    'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
}

function updateStats() {
  const today = new Date(); today.setHours(0,0,0,0)
  const todayRows = allRows.filter(r => new Date(r.created_at) >= today)
  const completed = todayRows.filter(r => r.status === 'complete')
  const errors    = todayRows.filter(r => r.status === 'error')
  const durations = completed.filter(r => r.duration != null).map(r => r.duration)
  const recDurs   = completed.filter(r => r.recording_duration_sec != null).map(r => r.recording_duration_sec)
  const ips       = new Set(todayRows.filter(r => r.ip_address).map(r => r.ip_address))
  const totalChars = allRows.reduce((n, r) => n + (r.transcription_len || 0), 0)

  const callable  = todayRows.filter(r => r.status !== 'no_phone' && r.status !== 'cached')
  const rate = callable.length
    ? Math.round(completed.length / callable.length * 100)
    : null

  document.getElementById('statToday').textContent    = todayRows.length
  document.getElementById('statSuccess').textContent  = rate != null ? `${rate}%` : '—'
  document.getElementById('statErrors').textContent   = errors.length
  document.getElementById('statAvgDur').textContent   = durations.length
    ? fmtSec(Math.round(durations.reduce((a,b) => a+b,0) / durations.length))
    : '—'
  document.getElementById('statAvgRec').textContent   = recDurs.length
    ? fmtSec(Math.round(recDurs.reduce((a,b) => a+b,0) / recDurs.length))
    : '—'
  document.getElementById('statIPs').textContent      = ips.size || '—'
  document.getElementById('statChars').textContent    = totalChars > 1000
    ? Math.round(totalChars / 1000) + 'k'
    : totalChars || '—'
}

// ── Filters & sort ───────────────────────────────────────────────────────────
function applyFilters() { renderTable() }

function clearFilters() {
  document.getElementById('fStatus').value = ''
  document.getElementById('fIcao').value   = ''
  document.getElementById('fIp').value     = ''
  document.getElementById('fDate').value   = '1'
  fetchJobs()
}

function sortBy(key) {
  if (sortKey === key) { sortDir *= -1 }
  else { sortKey = key; sortDir = -1 }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc','sort-desc'))
  const cols = ['created_at','icao','status','ip_address','duration','recording_duration_sec','transcription_len']
  const idx  = cols.indexOf(key)
  if (idx >= 0) {
    const th = document.querySelectorAll('thead th')[idx]
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc')
  }
  renderTable()
}

function filtered() {
  const fStatus = document.getElementById('fStatus').value.toLowerCase()
  const fIcao   = document.getElementById('fIcao').value.toUpperCase().trim()
  const fIp     = document.getElementById('fIp').value.trim()
  return allRows.filter(r => {
    if (fStatus && r.status !== fStatus) return false
    if (fIcao   && r.icao  !== fIcao)   return false
    if (fIp     && !(r.ip_address || '').includes(fIp)) return false
    return true
  }).sort((a, b) => {
    const av = a[sortKey] ?? ''
    const bv = b[sortKey] ?? ''
    if (av < bv) return -sortDir
    if (av > bv) return  sortDir
    return 0
  })
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTable() {
  const rows = filtered()
  const tbody = document.getElementById('tbody')
  document.getElementById('rowCount').textContent = `${rows.length} row${rows.length !== 1 ? 's' : ''}`
  document.getElementById('noRows').style.display = rows.length ? 'none' : 'block'

  tbody.innerHTML = rows.map(r => {
    const t   = new Date(r.created_at)
    const ts  = t.toLocaleDateString([], { month:'short', day:'numeric' })
         + ' ' + t.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' })
    const dur = r.duration != null ? fmtSec(r.duration) : '<span class="dim">—</span>'
    const rec = r.recording_duration_sec != null
      ? `${r.recording_duration_sec}s`
      : '<span class="dim">—</span>'
    const chars = r.transcription_len
      ? `${r.transcription_len} ch`
      : '<span class="dim">—</span>'
    const sid = r.call_sid
      ? `<span class="dim" title="${r.call_sid}">${r.call_sid.slice(-8)}</span>`
      : '<span class="dim">—</span>'
    const err = r.error_msg
      ? `<span class="err" title="${esc(r.error_msg)}">${esc(r.error_msg)}</span>`
      : '<span class="dim">—</span>'
    return `<tr onclick="openDrawer('${r.id}')">
      <td class="dim">${ts}</td>
      <td class="icao">${r.icao}</td>
      <td><span class="pill pill-${r.status}">${r.status}</span></td>
      <td class="dim">${r.ip_address || '<span class="dim">—</span>'}</td>
      <td>${dur}</td>
      <td>${rec}</td>
      <td>${chars}</td>
      <td>${sid}</td>
      <td>${err}</td>
    </tr>`
  }).join('')
}

// ── Detail drawer ─────────────────────────────────────────────────────────────
function openDrawer(id) {
  const r = allRows.find(x => x.id === id)
  if (!r) return
  const body = document.getElementById('drawerBody')
  const rows = [
    ['Job ID',           r.id],
    ['Airport',          r.icao],
    ['Status',           `<span class="pill pill-${r.status}">${r.status}</span>`],
    ['IP Address',       r.ip_address || '—'],
    ['Call SID',         r.call_sid || '—'],
    ['Created',          fmtDateFull(r.created_at)],
    ['Completed',        r.completed_at ? fmtDateFull(r.completed_at) : '—'],
    ['Total Duration',   r.duration != null ? fmtSec(r.duration) : '—'],
    ['Recording',        r.recording_duration_sec != null ? `${r.recording_duration_sec}s` : '—'],
    ['Transcript Chars', r.transcription_len || '—'],
    ['Recording URL',    r.recording_url
      ? `<a href="${esc(r.recording_url)}" target="_blank" style="color:var(--accent)">${esc(r.recording_url).slice(-40)}</a>`
      : '—'],
    ['Error',            r.error_msg ? `<span class="err">${esc(r.error_msg)}</span>` : '—'],
  ]
  body.innerHTML = rows.map(([k,v]) =>
    `<div class="drawer-row"><div class="drawer-key">${k}</div><div class="drawer-val">${v}</div></div>`
  ).join('')
  if (r.transcription) {
    body.innerHTML += `<div style="margin-top:8px"><div class="drawer-key" style="margin-bottom:6px;color:var(--text-dim);font-size:11px">TRANSCRIPT</div>
      <div class="transcript-box">${esc(r.transcription)}</div></div>`
  }
  document.getElementById('drawer').classList.add('open')
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open')
}

// ── Live updates ──────────────────────────────────────────────────────────────
let realtimeWs = null

function connectRealtime() {
  const wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket'
    + `?apikey=${SUPABASE_ANON}&vsn=1.0.0`
  realtimeWs = new WebSocket(wsUrl)
  const indicator = document.getElementById('liveIndicator')

  realtimeWs.onopen = () => {
    indicator.classList.remove('off')
    const joinMsg = {
      topic: 'realtime:public:atis_jobs',
      event: 'phx_join',
      payload: { config: { broadcast: { self: false }, presence: { key: '' },
        postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'atis_jobs' },
                           { event: 'UPDATE', schema: 'public', table: 'atis_jobs' }] } },
      ref: '1'
    }
    realtimeWs.send(JSON.stringify(joinMsg))
    // heartbeat
    setInterval(() => realtimeWs?.readyState === 1 &&
      realtimeWs.send(JSON.stringify({ topic:'phoenix', event:'heartbeat', payload:{}, ref:'hb' })), 25000)
  }

  realtimeWs.onmessage = ev => {
    try {
      const msg = JSON.parse(ev.data)
      if (msg.event !== 'postgres_changes') return
      const rec = msg.payload?.data?.record
      if (!rec) return
      const augmented = {
        ...rec,
        duration: (rec.completed_at && rec.created_at)
          ? Math.round((new Date(rec.completed_at) - new Date(rec.created_at)) / 1000)
          : null,
        transcription_len: rec.transcription ? rec.transcription.length : 0,
      }
      const idx = allRows.findIndex(r => r.id === augmented.id)
      const isNew = idx === -1
      if (isNew) allRows.unshift(augmented)
      else allRows[idx] = augmented
      updateStats()
      renderTable()
      if (isNew) {
        // flash the new row
        const first = document.getElementById('tbody').firstElementChild
        if (first) { first.classList.add('new-row'); setTimeout(() => first.classList.remove('new-row'), 700) }
      }
      document.getElementById('lastRefresh').textContent =
        'Live · ' + new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' })
    } catch (_) {}
  }

  realtimeWs.onclose = () => {
    indicator.classList.add('off')
    setTimeout(connectRealtime, 5000) // reconnect
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtSec(s) {
  if (s == null) return '—'
  const m = Math.floor(s / 60)
  const sec = s % 60
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`
}

function fmtDateFull(iso) {
  if (!iso) return '—'
  return new Date(iso).toLocaleString([], { month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit' })
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  fetchJobs()
  connectRealtime()
  // Refresh every 60s in case realtime misses something
  setInterval(fetchJobs, 60_000)
}

document.getElementById('fDate').addEventListener('change', fetchJobs)
</script>
