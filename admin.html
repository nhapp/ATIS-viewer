<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATIS Admin</title>
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#30363d;
    --text:#e6edf3; --dim:#7d8590; --accent:#58a6ff;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --teal:#64ffda;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:12px;}

  /* Auth */
  #gate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
  #gate h1{font-size:15px;letter-spacing:3px;color:var(--dim);}
  #gate input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:6px;font-family:inherit;font-size:13px;width:260px;outline:none;}
  #gate input:focus{border-color:var(--accent);}
  #gate button{background:var(--accent);color:#000;border:none;padding:9px 0;border-radius:6px;font-family:inherit;font-weight:700;cursor:pointer;width:260px;}
  #authErr{color:var(--red);font-size:11px;}

  /* App */
  #app{display:none;flex-direction:column;height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;
    display:flex;align-items:center;gap:12px;}
  header h1{font-size:12px;letter-spacing:2px;color:var(--dim);flex:1;}
  #dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  #dot.off{background:var(--dim);}
  #ts{color:var(--dim);font-size:10px;}
  header button{background:none;border:1px solid var(--border);color:var(--dim);padding:3px 10px;
    border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;}
  header button:hover{border-color:var(--red);color:var(--red);}

  /* Toolbar */
  #toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 16px;
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  #toolbar select,#toolbar input{background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:4px 8px;border-radius:4px;font-family:inherit;font-size:11px;outline:none;}
  #toolbar select:focus,#toolbar input:focus{border-color:var(--accent);}
  #rowLabel{color:var(--dim);font-size:10px;margin-left:auto;}

  /* Table */
  #wrap{flex:1;overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--surface);position:sticky;top:0;z-index:1;
    padding:7px 10px;text-align:left;color:var(--dim);font-size:10px;
    letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);
    white-space:nowrap;cursor:pointer;user-select:none;}
  thead th:hover{color:var(--accent);}
  thead th.asc::after{content:' ↑';color:var(--accent);}
  thead th.desc::after{content:' ↓';color:var(--accent);}
  tbody tr{border-bottom:1px solid #1c2128;}
  tbody tr:hover{background:#1c2128;cursor:pointer;}
  tbody td{padding:6px 10px;white-space:nowrap;}
  .new{animation:flash .7s ease;}
  @keyframes flash{from{background:#1a3c2a;}to{background:transparent;}}

  .icao{color:var(--accent);font-weight:700;}
  .dim{color:var(--dim);}
  .pill{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;text-transform:uppercase;}
  .p-complete{background:#1a3c2a;color:var(--green);}
  .p-error{background:#3c1a1a;color:var(--red);}
  .p-transcribing,.p-calling{background:#3c2e1a;color:var(--yellow);}
  .p-no_phone,.p-pending{background:#222;color:var(--dim);}
  .err{color:var(--red);max-width:220px;overflow:hidden;text-overflow:ellipsis;}

  /* Detail pane */
  #pane{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--surface);
    border-left:1px solid var(--border);transform:translateX(100%);transition:transform .2s;
    overflow-y:auto;z-index:10;}
  #pane.open{transform:none;}
  #paneHead{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);
    padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  #paneHead span{color:var(--dim);font-size:11px;letter-spacing:1px;}
  #paneHead button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;}
  #paneBody{padding:14px;}
  .pr{display:flex;gap:8px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid #21262d;}
  .pr:last-child{border-bottom:none;}
  .pk{color:var(--dim);width:120px;flex-shrink:0;font-size:10px;padding-top:1px;}
  .pv{color:var(--text);word-break:break-all;font-size:11px;}
  .tx{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:9px;
    font-size:10px;line-height:1.7;white-space:pre-wrap;word-break:break-word;
    max-height:280px;overflow-y:auto;color:var(--dim);margin-top:6px;}
</style>
</head>
<body>

<div id="gate">
  <h1>ATIS ADMIN</h1>
  <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
  <button onclick="auth()">Sign In</button>
  <div id="authErr"></div>
</div>

<div id="app">
  <header>
    <h1>ATIS · TRANSACTION LOG</h1>
    <div id="dot"></div>
    <span id="ts"></span>
    <button onclick="logout()">Sign Out</button>
  </header>
  <div id="toolbar">
    <select id="fStatus" onchange="render()">
      <option value="">All statuses</option>
      <option value="complete">Complete</option>
      <option value="error">Error</option>
      <option value="transcribing">Transcribing</option>
      <option value="calling">Calling</option>
      <option value="no_phone">No phone</option>
    </select>
    <input id="fIcao" placeholder="Airport…" maxlength="4" oninput="this.value=this.value.toUpperCase();render()" style="width:80px">
    <select id="fDays" onchange="load()">
      <option value="1">Today</option>
      <option value="7">7 days</option>
      <option value="30">30 days</option>
      <option value="0">All time</option>
    </select>
    <span id="rowLabel"></span>
  </div>
  <div id="wrap">
    <table>
      <thead><tr>
        <th data-k="created_at" onclick="sort(this)">Time</th>
        <th data-k="icao" onclick="sort(this)">Airport</th>
        <th data-k="status" onclick="sort(this)">Status</th>
        <th data-k="ip_address" onclick="sort(this)">IP</th>
        <th data-k="dur" onclick="sort(this)">Duration</th>
        <th data-k="recording_duration_sec" onclick="sort(this)">Recording</th>
        <th data-k="tlen" onclick="sort(this)">Transcript</th>
        <th data-k="error_msg" onclick="sort(this)">Error</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="pane">
  <div id="paneHead"><span>DETAIL</span><button onclick="closePane()">×</button></div>
  <div id="paneBody"></div>
</div>

<script>
const URL0   = 'https://zkilbgilzoxlxbyzyqgn.supabase.co'
const ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpraWxiZ2lsem94bHhieXp5cWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2NDMxNTUsImV4cCI6MjA1OTIxOTE1NX0.s_a5D46TUHbQgLXiUbeGKPLBE2bNINe0AhLJl09eU_U'
const PASS   = 'atis-admin-2026'
const LIMIT  = 1000

let rows = [], sortKey = 'created_at', sortDir = -1

// ── Auth ──────────────────────────────────────────────────────────────────────
function auth() {
  if (document.getElementById('pw').value === PASS) {
    sessionStorage.setItem('aa','1'); show()
  } else document.getElementById('authErr').textContent = 'Wrong password.'
}
document.getElementById('pw').addEventListener('keydown', e => e.key==='Enter' && auth())
function logout() { sessionStorage.removeItem('aa'); location.reload() }
if (sessionStorage.getItem('aa')==='1') show()
function show() {
  document.getElementById('gate').style.display = 'none'
  document.getElementById('app').style.display  = 'flex'
  load(); connect(); setInterval(load, 60000)
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function load() {
  const days = +document.getElementById('fDays').value
  let url = `${URL0}/rest/v1/atis_jobs?select=id,icao,status,ip_address,call_sid,recording_url,transcription,error_msg,created_at,completed_at,recording_duration_sec&order=created_at.desc&limit=${LIMIT}`
  if (days > 0) {
    const since = new Date(Date.now() - days*86400000).toISOString()
    url += `&created_at=gte.${encodeURIComponent(since)}`
  }
  const r = await fetch(url, { headers:{apikey:ANON,Authorization:`Bearer ${ANON}`} })
  if (!r.ok) return
  rows = (await r.json()).map(aug)
  render()
  document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}

function aug(r) {
  return { ...r,
    dur:  r.completed_at && r.created_at ? Math.round((new Date(r.completed_at)-new Date(r.created_at))/1000) : null,
    tlen: r.transcription ? r.transcription.length : 0,
  }
}

// ── Sort & filter ─────────────────────────────────────────────────────────────
function sort(th) {
  const k = th.dataset.k
  sortDir = k === sortKey ? -sortDir : -1
  sortKey = k
  document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc','desc'))
  th.classList.add(sortDir===1?'asc':'desc')
  render()
}

function filtered() {
  const fs = document.getElementById('fStatus').value
  const fi = document.getElementById('fIcao').value.trim()
  return rows
    .filter(r => (!fs || r.status===fs) && (!fi || r.icao===fi))
    .sort((a,b) => {
      const av=a[sortKey]??'', bv=b[sortKey]??''
      return av<bv ? -sortDir : av>bv ? sortDir : 0
    })
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const data = filtered()
  document.getElementById('rowLabel').textContent = `${data.length} row${data.length!==1?'s':''}`
  document.getElementById('tbody').innerHTML = data.map(r => {
    const t = new Date(r.created_at)
    const ts = t.toLocaleDateString([],{month:'short',day:'numeric'}) + ' ' +
               t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})
    return `<tr onclick="openPane('${r.id}')">
      <td class="dim">${ts}</td>
      <td class="icao">${r.icao}</td>
      <td><span class="pill p-${r.status}">${r.status}</span></td>
      <td class="dim">${r.ip_address||'—'}</td>
      <td class="dim">${r.dur!=null?fmtSec(r.dur):'—'}</td>
      <td class="dim">${r.recording_duration_sec!=null?r.recording_duration_sec+'s':'—'}</td>
      <td class="dim">${r.tlen||'—'}</td>
      <td>${r.error_msg?`<span class="err" title="${esc(r.error_msg)}">${esc(r.error_msg)}</span>`:'<span class="dim">—</span>'}</td>
    </tr>`
  }).join('')
}

// ── Detail pane ───────────────────────────────────────────────────────────────
function openPane(id) {
  const r = rows.find(x=>x.id===id); if(!r) return
  const fields = [
    ['Job ID',       r.id],
    ['Airport',      r.icao],
    ['Status',       `<span class="pill p-${r.status}">${r.status}</span>`],
    ['IP Address',   r.ip_address||'—'],
    ['Call SID',     r.call_sid||'—'],
    ['Created',      fmtFull(r.created_at)],
    ['Completed',    fmtFull(r.completed_at)],
    ['Duration',     r.dur!=null?fmtSec(r.dur):'—'],
    ['Recording',    r.recording_duration_sec!=null?r.recording_duration_sec+'s':'—'],
    ['Transcript',   r.tlen||'—'],
    ['Recording URL',r.recording_url?`<a href="${esc(r.recording_url)}" target="_blank" style="color:var(--accent)">${esc(r.recording_url).slice(-36)}</a>`:'—'],
    ['Error',        r.error_msg?`<span class="err">${esc(r.error_msg)}</span>`:'—'],
  ]
  let html = fields.map(([k,v])=>`<div class="pr"><div class="pk">${k}</div><div class="pv">${v}</div></div>`).join('')
  if (r.transcription) html += `<div class="tx">${esc(r.transcription)}</div>`
  document.getElementById('paneBody').innerHTML = html
  document.getElementById('pane').classList.add('open')
}
function closePane() { document.getElementById('pane').classList.remove('open') }

// ── Live updates ──────────────────────────────────────────────────────────────
function connect() {
  const wsUrl = URL0.replace('https://','wss://') + `/realtime/v1/websocket?apikey=${ANON}&vsn=1.0.0`
  const ws = new WebSocket(wsUrl)
  const dot = document.getElementById('dot')
  ws.onopen = () => {
    dot.classList.remove('off')
    ws.send(JSON.stringify({topic:'realtime:public:atis_jobs',event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:''},postgres_changes:[{event:'INSERT',schema:'public',table:'atis_jobs'},{event:'UPDATE',schema:'public',table:'atis_jobs'}]}},ref:'1'}))
    setInterval(()=>ws.readyState===1&&ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'})),25000)
  }
  ws.onmessage = ev => {
    try {
      const msg = JSON.parse(ev.data)
      if (msg.event!=='postgres_changes') return
      const rec = msg.payload?.data?.record; if(!rec) return
      const r = aug(rec)
      const i = rows.findIndex(x=>x.id===r.id)
      const isNew = i===-1
      if (isNew) rows.unshift(r); else rows[i]=r
      render()
      if (isNew) {
        const first = document.getElementById('tbody').firstElementChild
        if (first){first.classList.add('new');setTimeout(()=>first.classList.remove('new'),800)}
      }
      document.getElementById('ts').textContent = 'Live · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})
    } catch(_){}
  }
  ws.onclose = () => { dot.classList.add('off'); setTimeout(connect,5000) }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtSec(s){ const m=Math.floor(s/60),sec=s%60; return m?`${m}m ${sec}s`:`${sec}s` }
function fmtFull(iso){ return iso?new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—' }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
</script>
</body>
</html>
