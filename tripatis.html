<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Trip ATIS Planner</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg: #070c18;
      --surface: #0d1525;
      --surface-2: #131e30;
      --border: #1e2d45;
      --accent: #00b4d8;
      --text: #ccd6f6;
      --text-dim: #8892b0;
      --green: #64ffda;
      --amber: #ffb347;
      --red: #ff6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-back {
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 1px;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .header-back:hover { border-color: var(--accent); color: var(--accent); }
    .header-title { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    .header-build { margin-left: auto; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }

    .main { padding: 20px; max-width: 1100px; margin: 0 auto; }

    /* ── Airport columns ── */
    .airports-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 16px;
      transition: grid-template-columns 0.3s ease;
    }
    .airports-grid.two-col { grid-template-columns: 1fr 1fr; }
    @media (max-width: 640px) { .airports-grid.two-col { grid-template-columns: 1fr; } }

    .col-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .dep-col .col-header { color: var(--amber); }
    .arr-col .col-header { color: var(--green); }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); letter-spacing: 0; }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 2px); left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      z-index: 200;
      max-height: 240px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .search-dropdown.visible { display: block; }
    .dd-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.active { background: var(--surface-2); }
    .dd-icao { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; min-width: 46px; }
    .dd-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .dd-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dd-city { font-size: 11px; color: var(--text-dim); }

    /* ── Weather card ── */
    .wx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      min-height: 60px;
      transition: min-height 0.3s;
    }
    .wx-card.empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 11px; letter-spacing: 1px;
      min-height: 60px;
    }
    .wx-card.loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60px;
    }
    .wx-icao { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: var(--text); }
    .wx-name { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin: 3px 0 14px; }
    .wx-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
    .wx-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-dim); min-width: 68px; }
    .wx-val { font-size: 13px; }
    .wx-time { font-size: 10px; color: var(--text-dim); margin-top: 10px; letter-spacing: 0.5px; }

    .flight-cat {
      font-size: 11px; font-weight: 900; padding: 3px 8px;
      border-radius: 4px; letter-spacing: 1px;
    }
    .flight-cat.VFR  { background: rgba(100,255,100,0.12); color: #64ff64; border: 1px solid rgba(100,255,100,0.3); }
    .flight-cat.MVFR { background: rgba(100,150,255,0.12); color: #6496ff; border: 1px solid rgba(100,150,255,0.3); }
    .flight-cat.IFR  { background: rgba(255,100,100,0.12); color: #ff6464; border: 1px solid rgba(255,100,100,0.3); }
    .flight-cat.LIFR { background: rgba(200,100,255,0.12); color: #c864ff; border: 1px solid rgba(200,100,255,0.3); }

    /* ── Fade-in animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.35s ease forwards; }

    /* ── Planning card ── */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 0;
    }
    .plan-header {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      color: var(--text-dim); margin-bottom: 18px;
    }

    /* ── ETA row ── */
    .eta-row {
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap; margin-bottom: 18px;
    }
    .eta-label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); }
    .day-radio { display: flex; align-items: center; gap: 5px; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
    .day-radio input { accent-color: var(--accent); cursor: pointer; }
    .time-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .time-input:focus { border-color: var(--accent); }
    .time-input::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    /* ── Analysis banner ── */
    .analysis-card {
      border-radius: 8px; padding: 12px 16px;
      margin-bottom: 16px; font-size: 12px; display: none;
    }
    .analysis-card.show { display: block; }
    .analysis-card.valid   { background: rgba(100,255,218,0.06); border: 1px solid rgba(100,255,218,0.25); }
    .analysis-card.warning { background: rgba(255,179,71,0.06);  border: 1px solid rgba(255,179,71,0.25); }
    .analysis-title { font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
    .analysis-detail { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    /* ── Buttons ── */
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-outline:hover { background: rgba(0,180,216,0.1); }
    .btn-outline:disabled { opacity: 0.35; cursor: default; }

    /* ── ATIS result ── */
    .atis-result {
      background: rgba(100,255,218,0.04);
      border: 1px solid rgba(100,255,218,0.2);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
    }
    .atis-result-title { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: 2px; margin-bottom: 10px; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    /* ── SMS section ── */
    .alert-header { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--amber); margin-bottom: 6px; }
    .alert-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.6; }
    .phone-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .phone-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 200px;
      transition: border-color 0.2s;
    }
    .phone-input:focus { border-color: var(--amber); }
    .phone-input::placeholder { color: var(--text-dim); }
    .btn-amber {
      background: transparent;
      border: 1px solid var(--amber);
      color: var(--amber);
      padding: 8px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-amber:hover { background: rgba(255,179,71,0.1); }
    .btn-amber:disabled { opacity: 0.35; cursor: default; }
    .alert-status { font-size: 11px; margin-top: 10px; letter-spacing: 0.5px; }
    .alert-status.ok   { color: var(--green); }
    .alert-status.info { color: var(--text-dim); }
    .alert-status.err  { color: var(--red); }

    /* ── Loading dots ── */
    .dot { animation: blink 1.2s infinite; display: inline-block; margin: 0 2px; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="header-back">← ATIS VIEWER</a>
  <span class="header-title">✈ TRIP ATIS PLANNER</span>
  <span class="header-build" id="buildBadge"></span>
</header>

<div class="main">

  <!-- ── Step 1 + 2: Airport cards ── -->
  <div class="airports-grid" id="airports-grid">

    <!-- Departure -->
    <div class="dep-col">
      <div class="col-header">DEPARTURE AIRPORT</div>
      <div class="search-wrap">
        <input id="dep-input" class="search-input" placeholder="ICAO or airport name…" autocomplete="off">
        <div id="dep-dropdown" class="search-dropdown"></div>
      </div>
      <div id="dep-card" class="wx-card empty">Enter departure airport above</div>
    </div>

    <!-- Arrival — hidden until departure selected -->
    <div class="arr-col" id="arr-col" style="display:none">
      <div class="col-header">ARRIVAL AIRPORT</div>
      <div class="search-wrap">
        <input id="arr-input" class="search-input" placeholder="ICAO or airport name…" autocomplete="off">
        <div id="arr-dropdown" class="search-dropdown"></div>
      </div>
      <div id="arr-card" class="wx-card empty">Enter arrival airport above</div>
    </div>

  </div>

  <!-- ── Step 3+: Planning card — hidden until arrival selected ── -->
  <div id="plan-section" style="display:none">
    <div class="plan-card fade-in">
      <div class="plan-header">FLIGHT PLANNING</div>

      <!-- ETA -->
      <div class="eta-row">
        <span class="eta-label">EST ARRIVAL TIME</span>
        <label class="day-radio"><input type="radio" name="eta-day" value="today" checked> TODAY</label>
        <label class="day-radio"><input type="radio" name="eta-day" value="tomorrow"> TOMORROW</label>
        <input type="time" id="eta-time" class="time-input">
      </div>

      <!-- Analysis -->
      <div id="atis-analysis" class="analysis-card"></div>

      <!-- Retrieve button -->
      <div style="margin-bottom:16px">
        <button id="get-atis-btn" class="btn-outline">RETRIEVE ARRIVAL ATIS NOW</button>
      </div>

      <!-- ATIS result -->
      <div id="atis-result" class="atis-result"></div>

      <!-- SMS alert -->
      <div class="divider"></div>
      <div class="alert-header">ATIS ARRIVAL ALERT</div>
      <div class="alert-desc">Receive a text when the arrival ATIS updates near your ETA. Keep this page open to trigger the scheduled fetch.</div>
      <div class="phone-row">
        <input type="tel" id="alert-phone" class="phone-input" placeholder="+1 (555) 123-4567">
        <button id="set-alert-btn" class="btn-amber" disabled>SET ATIS ALERT</button>
      </div>
      <div id="alert-status" class="alert-status"></div>
    </div>
  </div>

</div>

<script>
const BUILD = '2026-04-09.5';
document.getElementById('buildBadge').textContent = `build ${BUILD}`;

const SB_URL   = 'https://zkilbgilzoxlxbyzyqgn.supabase.co';
const SB_KEY   = 'sb_publishable_c4O8q_kirKjnIViQ-P6vag_SeKEL4Pj';
const EDGE_URL = `${SB_URL}/functions/v1`;

function sb(path, method = 'GET', body = null, prefer = '') {
  return fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      ...(prefer ? { 'Prefer': prefer } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  }).catch(() => null);
}

function sbRealtime() {
  if (!window._sbClient) window._sbClient = window.supabase.createClient(SB_URL, SB_KEY);
  return window._sbClient;
}

function fmtTime(date, opts = {}) {
  return date.toLocaleTimeString([], opts).replace(/\s+(AM|PM)/i, '$1');
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  dep: { icao: null, metar: null, info: null },
  arr: { icao: null, metar: null, info: null, job: null, stationType: null },
};
let alertTimer = null;

// ── Progressive reveal ────────────────────────────────────────────────────────
function revealArrival() {
  const arrCol = document.getElementById('arr-col');
  if (arrCol.style.display === 'none') {
    arrCol.style.display = '';
    arrCol.classList.add('fade-in');
    document.getElementById('airports-grid').classList.add('two-col');
  }
}

function revealPlanning() {
  const ps = document.getElementById('plan-section');
  if (ps.style.display === 'none') {
    ps.style.display = '';
    // Re-trigger fade-in by removing and re-adding
    const card = ps.querySelector('.plan-card');
    card.classList.remove('fade-in');
    void card.offsetWidth;
    card.classList.add('fade-in');
    runAnalysis();
  }
}

// ── Airport search ────────────────────────────────────────────────────────────
function setupSearch(inputId, ddId, role) {
  const input = document.getElementById(inputId);
  const dd    = document.getElementById(ddId);
  let seq = 0;

  input.addEventListener('input', async () => {
    const q = input.value.trim();
    if (q.length < 2) { dd.classList.remove('visible'); return; }
    const mySeq = ++seq;
    const res = await sb(
      `airports?or=(icao.ilike.${encodeURIComponent(q+'%')},name.ilike.${encodeURIComponent('%'+q+'%')},iata.ilike.${encodeURIComponent(q+'%')})&select=icao,name,city,state&order=icao.asc&limit=10`
    );
    if (mySeq !== seq || !res?.ok) return;
    const rows = await res.json();
    if (!rows.length) { dd.classList.remove('visible'); return; }
    dd.innerHTML = rows.map((r, i) => `
      <div class="dd-item" data-icao="${r.icao}" data-idx="${i}">
        <span class="dd-icao">${r.icao}</span>
        <div class="dd-info">
          <div class="dd-name">${r.name || ''}</div>
          <div class="dd-city">${[r.city, r.state].filter(Boolean).join(', ')}</div>
        </div>
      </div>`).join('');
    dd.classList.add('visible');
  });

  dd.addEventListener('click', e => {
    const item = e.target.closest('.dd-item');
    if (!item) return;
    const icao = item.dataset.icao;
    input.value = icao;
    dd.classList.remove('visible');
    selectAirport(role, icao, item.querySelector('.dd-name')?.textContent || '', item.querySelector('.dd-city')?.textContent || '');
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('visible');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') dd.classList.remove('visible');
    if (e.key === 'Enter' && input.value.trim().length >= 3) {
      dd.classList.remove('visible');
      selectAirport(role, input.value.trim().toUpperCase(), '', '');
    }
  });
}

async function selectAirport(role, icao, name, city) {
  icao = icao.toUpperCase();
  const s = state[role];
  s.icao = icao;
  s.metar = null;
  s.info = { name, city };
  renderWxCard(role, null, true);

  if (role === 'dep') revealArrival();

  try {
    const raw = await fetchMetarRaw(icao);
    s.metar = parseRawMetar(raw);
    const info = await fetchAirportInfo(icao);
    if (info) s.info = info;
    renderWxCard(role, s.metar, false);
  } catch (err) {
    renderWxCard(role, null, false, err.message);
  }

  if (role === 'arr') {
    revealPlanning();
    checkStationType(icao);
    checkAtisCache(icao);
    updateAlertButton();
  }
}

// ── METAR fetch + parse ───────────────────────────────────────────────────────
async function fetchMetarRaw(icao) {
  const res = await fetch(`https://metar.vatsim.net/metar.php?id=${icao}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = (await res.text()).trim();
  if (!text || !text.toUpperCase().startsWith(icao.toUpperCase())) throw new Error('No METAR');
  return text;
}

async function fetchAirportInfo(icao) {
  const res = await sb(`airports?icao=eq.${encodeURIComponent(icao)}&select=name,city,state`);
  if (!res?.ok) return null;
  const [row] = await res.json();
  if (!row) return null;
  return { name: row.name, city: [row.city, row.state].filter(Boolean).join(', ') };
}

function parseMetarTime(raw) {
  const m = raw.match(/\b(\d{2})(\d{2})(\d{2})Z\b/);
  if (!m) return null;
  const [, , hh, mm] = m;
  const now = new Date();
  const utc = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), parseInt(m[1]), parseInt(hh), parseInt(mm)));
  if (utc > now + 12 * 3600000) utc.setUTCMonth(utc.getUTCMonth() - 1);
  return {
    zuluStr:  `${hh}${mm}Z`,
    localStr: fmtTime(utc, { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' }),
  };
}

function parseRawMetar(raw) {
  let wind = null;
  if (/\b00000KT\b/.test(raw)) {
    wind = { dir: null, spd: 0, gust: null };
  } else {
    const wm = raw.match(/\b(VRB|\d{3})(\d{2,3})(?:G(\d{2,3}))?KT\b/);
    if (wm) wind = { dir: wm[1] === 'VRB' ? 'VRB' : wm[1], spd: parseInt(wm[2]), gust: wm[3] ? parseInt(wm[3]) : null };
  }
  let visibility = null;
  const visM = raw.match(/\b(\d+(?:\s+\d+\/\d+)?|\d+\/\d+)SM\b/);
  if (visM) visibility = visM[1];
  else if (/\b10\+SM\b/.test(raw)) visibility = '10+';

  const clouds = [];
  const skyRe = /\b(SKC|CLR|FEW|SCT|BKN|OVC|VV)(\d{3})?(CB|TCU)?\b/g;
  let sm;
  while ((sm = skyRe.exec(raw)) !== null) clouds.push({ cover: sm[1], base: sm[2] ? parseInt(sm[2]) : null });

  let altimeter = null;
  const altM = raw.match(/\bA(\d{4})\b/);
  if (altM) altimeter = altM[1].slice(0,2) + '.' + altM[1].slice(2);

  return { wind, visibility, clouds, altimeter, flightCat: calcFlightCat(clouds, visibility), obsTime: parseMetarTime(raw) };
}

function calcFlightCat(clouds, visibility) {
  let ceil = Infinity;
  for (const c of clouds)
    if ((c.cover === 'BKN' || c.cover === 'OVC' || c.cover === 'VV') && c.base !== null)
      ceil = Math.min(ceil, c.base * 100);
  const vis = parseFloat(visibility) || Infinity;
  if (ceil < 500  || vis < 1) return 'LIFR';
  if (ceil < 1000 || vis < 3) return 'IFR';
  if (ceil <= 3000 || vis <= 5) return 'MVFR';
  return 'VFR';
}

// ── Weather card renderer ─────────────────────────────────────────────────────
function renderWxCard(role, metar, loading, errMsg) {
  const el   = document.getElementById(`${role}-card`);
  const s    = state[role];
  const icao = s.icao;

  if (loading) {
    el.className = 'wx-card loading';
    el.innerHTML = `<span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>`;
    return;
  }
  if (errMsg) {
    el.className = 'wx-card';
    el.innerHTML = `<div class="wx-icao">${icao}</div>
      <div style="font-size:11px;color:var(--red);margin-top:6px">⚠ ${errMsg}</div>`;
    return;
  }
  if (!metar) {
    el.className = 'wx-card empty';
    el.innerHTML = 'Enter airport above';
    return;
  }

  const name = s.info?.name || '';
  const city = s.info?.city || '';
  const wind = metar.wind;
  const windStr = !wind ? 'N/A'
    : wind.dir === null ? 'CALM'
    : `${wind.dir === 'VRB' ? 'VRB' : wind.dir + '°'} @ ${wind.spd}KT${wind.gust ? ' G' + wind.gust : ''}`;

  let ceilStr = 'CLR';
  for (const c of metar.clouds)
    if ((c.cover === 'BKN' || c.cover === 'OVC' || c.cover === 'VV') && c.base !== null) {
      ceilStr = `${c.cover} ${c.base * 100}FT`; break;
    }

  el.className = 'wx-card fade-in';
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div>
        <div class="wx-icao">${icao}</div>
        <div class="wx-name">${name}${city ? ' · ' + city : ''}</div>
      </div>
      ${metar.flightCat ? `<span class="flight-cat ${metar.flightCat}">${metar.flightCat}</span>` : ''}
    </div>
    <div class="wx-row"><span class="wx-label">WIND</span><span class="wx-val">${windStr}</span></div>
    <div class="wx-row"><span class="wx-label">VISIBILITY</span><span class="wx-val">${metar.visibility ? metar.visibility + ' SM' : 'N/A'}</span></div>
    <div class="wx-row"><span class="wx-label">CEILING</span><span class="wx-val">${ceilStr}</span></div>
    <div class="wx-row"><span class="wx-label">ALTIMETER</span><span class="wx-val">${metar.altimeter ? 'A' + metar.altimeter : 'N/A'}</span></div>
    ${metar.obsTime ? `<div class="wx-time">${metar.obsTime.zuluStr} | ${metar.obsTime.localStr}</div>` : ''}`;
}

// ── Arrival ATIS cache + station type ─────────────────────────────────────────
async function checkStationType(icao) {
  const res = await sb(`atis_phones?icao=eq.${icao}&select=type`);
  if (!res?.ok) return;
  const [row] = await res.json();
  state.arr.stationType = row?.type ?? null;
}

async function checkAtisCache(icao) {
  const res = await sb(`atis_cache?icao=eq.${icao}&select=transcription,parsed,audio_url,fetched_at`);
  if (!res?.ok) return;
  const [cache] = await res.json();
  if (!cache) return;
  const validMs = (state.arr.stationType && state.arr.stationType !== 'atis') ? 3600000 : 2700000;
  if (new Date() - new Date(cache.fetched_at) > validMs) return;
  state.arr.job = { status: 'complete', parsed: cache.parsed, transcription: cache.transcription, audioUrl: cache.audio_url, fetchedAt: cache.fetched_at };
  renderAtisResult();
}

// ── ATIS timing analysis ──────────────────────────────────────────────────────
function getEtaDate() {
  const val = document.getElementById('eta-time').value;
  if (!val) return null;
  const [hh, mm] = val.split(':').map(Number);
  const d = new Date();
  if (document.querySelector('input[name="eta-day"]:checked').value === 'tomorrow') d.setDate(d.getDate() + 1);
  d.setHours(hh, mm, 0, 0);
  return d;
}

function computeNotifyAfter(etaDate) {
  // Fetch at :58 of the hour whose :53 METAR precedes arrival
  const n = new Date(etaDate);
  n.setMinutes(58, 0, 0);
  if (etaDate.getMinutes() < 58) n.setHours(n.getHours() - 1);
  const now = new Date();
  if (n <= now) n.setTime(now.getTime() + 2 * 60000);
  return n;
}

function runAnalysis() {
  const card = document.getElementById('atis-analysis');
  const eta  = getEtaDate();
  if (!eta) { card.className = 'analysis-card'; return; }

  const now = new Date();
  if (eta <= now) {
    card.className = 'analysis-card warning show';
    card.innerHTML = `<div class="analysis-title" style="color:var(--amber)">⚠️ ETA IS IN THE PAST</div>
      <div class="analysis-detail">Update your estimated arrival time.</div>`;
    return;
  }

  // Count METAR cycles (:53 marks) between now and ETA
  const nextMetar = new Date(now);
  nextMetar.setMinutes(53, 0, 0);
  if (now.getMinutes() >= 53) nextMetar.setHours(nextMetar.getHours() + 1);

  let updates = 0, check = new Date(nextMetar);
  while (check <= eta) { updates++; check.setHours(check.getHours() + 1); }

  const notify   = computeNotifyAfter(eta);
  const etaLocal = fmtTime(eta,    { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
  const ntfLocal = fmtTime(notify, { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });

  if (updates === 0) {
    card.className = 'analysis-card valid show';
    card.innerHTML = `<div class="analysis-title" style="color:var(--green)">✅ CURRENT ATIS VALID AT ARRIVAL</div>
      <div class="analysis-detail">ETA ${etaLocal} — No ATIS update expected. Current ATIS will be in effect.</div>`;
  } else {
    card.className = 'analysis-card warning show';
    card.innerHTML = `<div class="analysis-title" style="color:var(--amber)">⚠️ NEW ATIS EXPECTED BEFORE ARRIVAL</div>
      <div class="analysis-detail">
        ETA ${etaLocal} — ATIS will update <strong>${updates > 1 ? updates + ' times' : 'once'}</strong> before arrival.<br>
        New ATIS will be available around ${ntfLocal}.
      </div>`;
  }

  updateAlertButton();
}

// ── Retrieve arrival ATIS ─────────────────────────────────────────────────────
document.getElementById('get-atis-btn').addEventListener('click', fetchArrAtis);

async function fetchArrAtis() {
  const icao = state.arr.icao;
  if (!icao) return;
  const btn = document.getElementById('get-atis-btn');
  btn.disabled = true;
  btn.textContent = 'RETRIEVING…';
  state.arr.job = { status: 'calling' };
  renderAtisResult();

  try {
    const res = await fetch(`${EDGE_URL}/fetch-atis`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ icao }),
    }).catch(() => null);
    if (!res) throw new Error('Could not reach server');
    const data = await res.json();

    if (data.status === 'cached') {
      state.arr.job = { status: 'complete', parsed: data.data.parsed, transcription: data.data.transcription, audioUrl: data.data.audio_url, fetchedAt: data.data.fetched_at };
      renderAtisResult();
      btn.disabled = false; btn.textContent = 'RETRIEVE ARRIVAL ATIS NOW';
      return;
    }
    if (data.job_id) {
      state.arr.job = { status: 'transcribing' };
      renderAtisResult();
      subscribeToJob(icao, data.job_id);
      return;
    }
    throw new Error(data.error || 'Unexpected response');
  } catch (err) {
    state.arr.job = { status: 'error', error: err.message };
    renderAtisResult();
    btn.disabled = false; btn.textContent = 'RETRIEVE ARRIVAL ATIS NOW';
  }
}

function subscribeToJob(icao, jobId) {
  const ch = sbRealtime().channel(`trip-${jobId}`)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'atis_jobs', filter: `id=eq.${jobId}` }, payload => {
      const row = payload.new;
      state.arr.job = { status: row.status, parsed: row.parsed, transcription: row.transcription, audioUrl: row.audio_url, fetchedAt: row.completed_at, error: row.error_msg };
      renderAtisResult();
      if (row.status === 'complete' || row.status === 'error') {
        ch.unsubscribe();
        const btn = document.getElementById('get-atis-btn');
        btn.disabled = false; btn.textContent = 'RETRIEVE ARRIVAL ATIS NOW';
      }
    }).subscribe();
}

function renderAtisResult() {
  const el  = document.getElementById('atis-result');
  const job = state.arr.job;
  if (!job) { el.style.display = 'none'; return; }
  el.style.display = '';

  const LABELS = {
    calling:      '📞 RETRIEVING ATIS…',
    transcribing: '🎙️ TRANSCRIBING AUDIO…',
    error:        '⚠️ FETCH FAILED',
  };

  if (job.status !== 'complete') {
    el.innerHTML = `<div class="atis-result-title">${LABELS[job.status] || job.status.toUpperCase()}</div>
      ${job.error ? `<div style="font-size:11px;color:var(--red)">${job.error}</div>` : ''}`;
    return;
  }

  const p = job.parsed || {};
  const windStr = !p.wind ? '' : p.wind.spd === 0 ? 'CALM'
    : `${p.wind.dir}° @ ${p.wind.spd}KT${p.wind.gust ? ' G' + p.wind.gust + 'KT' : ''}`;
  const altStr = p.altimeter ? (() => { const a = String(p.altimeter); return a.length === 4 ? a.slice(0,2)+'.'+a.slice(2) : a; })() : null;

  el.innerHTML = `
    <div class="atis-result-title">✅ ATIS CURRENT${p.code ? ' · INFORMATION ' + p.code : ''}</div>
    ${job.fetchedAt ? `<div style="font-size:10px;color:var(--text-dim);margin-bottom:10px">Retrieved ${fmtTime(new Date(job.fetchedAt), { hour:'2-digit', minute:'2-digit' })}</div>` : ''}
    ${p.wind       ? `<div class="wx-row"><span class="wx-label">WIND</span><span class="wx-val">${windStr}</span></div>` : ''}
    ${p.visibility ? `<div class="wx-row"><span class="wx-label">VISIBILITY</span><span class="wx-val">${p.visibility} SM</span></div>` : ''}
    ${p.ceiling    ? `<div class="wx-row"><span class="wx-label">CEILING</span><span class="wx-val">${p.ceiling.cover} ${p.ceiling.height.toLocaleString()}FT</span></div>` : ''}
    ${altStr       ? `<div class="wx-row"><span class="wx-label">ALTIMETER</span><span class="wx-val">A${altStr}</span></div>` : ''}
    ${p.runway     ? `<div class="wx-row"><span class="wx-label">LANDING/DEP</span><span class="wx-val" style="font-size:16px;font-weight:900;color:var(--green)">${p.runway} ✓</span></div>` : ''}
    ${job.audioUrl ? `<div style="margin-top:10px"><audio controls style="width:100%;height:28px;opacity:0.85"><source src="${job.audioUrl}" type="audio/mpeg"></audio></div>` : ''}`;
}

// ── SMS alert ─────────────────────────────────────────────────────────────────
function updateAlertButton() {
  const eta = getEtaDate();
  document.getElementById('set-alert-btn').disabled = !(state.arr.icao && eta && eta > new Date());
}

document.getElementById('alert-phone').addEventListener('input', updateAlertButton);
document.getElementById('set-alert-btn').addEventListener('click', setAtisAlert);

async function setAtisAlert() {
  const icao  = state.arr.icao;
  const phone = document.getElementById('alert-phone').value.trim();
  const eta   = getEtaDate();
  const statusEl = document.getElementById('alert-status');
  if (!icao || !phone || !eta) return;

  const notify_after = computeNotifyAfter(eta);
  const btn = document.getElementById('set-alert-btn');
  btn.disabled = true;

  const res = await sb('atis_alert_subscriptions', 'POST',
    { icao, phone, notify_after: notify_after.toISOString() }, 'return=minimal');

  if (!res?.ok) {
    statusEl.className = 'alert-status err';
    statusEl.textContent = '⚠ Could not save alert. Check your connection.';
    btn.disabled = false;
    return;
  }

  const ntfLocal = fmtTime(notify_after, { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
  statusEl.className = 'alert-status ok';
  statusEl.textContent = `✅ ALERT SET — ATIS fetch scheduled for ${ntfLocal}. Keep this page open.`;

  clearTimeout(alertTimer);
  alertTimer = setTimeout(() => {
    statusEl.className = 'alert-status info';
    statusEl.textContent = `📞 RETRIEVING ATIS FOR ${icao}…`;
    fetchArrAtis();
  }, Math.max(notify_after.getTime() - Date.now(), 0));
}

// ── ETA wire-up ───────────────────────────────────────────────────────────────
document.getElementById('eta-time').addEventListener('input',  () => { runAnalysis(); updateAlertButton(); });
document.getElementById('eta-time').addEventListener('change', () => { runAnalysis(); updateAlertButton(); });
document.querySelectorAll('input[name="eta-day"]').forEach(r => r.addEventListener('change', () => { runAnalysis(); updateAlertButton(); }));

// Default ETA: now + 2 hours
const dflt = new Date(Date.now() + 2 * 3600000);
document.getElementById('eta-time').value =
  String(dflt.getHours()).padStart(2,'0') + ':' + String(dflt.getMinutes()).padStart(2,'0');

// ── Init search ───────────────────────────────────────────────────────────────
setupSearch('dep-input', 'dep-dropdown', 'dep');
setupSearch('arr-input', 'arr-dropdown', 'arr');
</script>
